<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTRO 기계설비 운영지원 시스템</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="home-view" class="hero-view">
        <div class="hero-content">
            <div style="letter-spacing: 6px; opacity: 0.8; margin-bottom: 15px;">DAEGU TRANSPORTATION CORP.</div>
            <h1>기계설비 가동현황<br>지능형 점검 시스템</h1>
            <button class="main-start-btn" onclick="showApp()">시스템 접속</button>
        </div>
    </div>
    <div id="app-view" class="hidden">
        <header class="app-header">
            <div class="container header-inner">
                <button class="back-btn" onclick="goBack()">← 뒤로가기</button>
                <div id="line-indicator" class="line-badge">노선을 선택하십시오</div>
                <div style="width:100px;"></div>
            </div>
        </header>
        <main class="container">
            <section id="line-selector" class="selector-view">
                <div class="selector-grid">
                    <div class="line-card l1" onclick="selectLine('line1')">
                        <div class="lnum">1</div>
                        <h3>1호선 가동점검</h3>
                    </div>
                    <div class="line-card l2" onclick="selectLine('line2')">
                        <div class="lnum">2</div>
                        <h3>2호선 가동점검</h3>
                    </div>
                </div>
            </section>
            <section id="main-content" class="hidden">
                <div id="season-banner" class="season-info"></div>
                <div class="upload-box" onclick="document.getElementById('excelFile').click()">
                    <input type="file" id="excelFile" hidden />
                    <div style="font-size: 3rem; margin-bottom: 10px;">📊</div>
                    <h3>가동일보 파일 업로드</h3>
                    <p style="color:#94a3b8; margin-top:10px;">파일 하나로 공조기와 공기청정기를 동시 점검합니다.</p>
                </div>
                <div id="summary-area"></div>
                <div id="full-list-area"></div>
            </section>
        </main>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
