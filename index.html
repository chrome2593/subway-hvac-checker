<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승강장 공조기 점검 시스템 | 대구교통공사</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #0054a6;
            --bg-color: #f4f7fa;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --success: #38a169;
            --danger: #e53e3e;
            --border-color: #e2e8f0;
        }

        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }

        header { margin-bottom: 30px; border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.5rem; margin: 0; color: var(--primary-color); letter-spacing: -0.5px; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .upload-area { border: 2px dashed var(--border-color); border-radius: 10px; padding: 40px; text-align: center; transition: all 0.3s ease; cursor: pointer; }
        .upload-area:hover { border-color: var(--primary-color); background-color: #f0f7ff; }
        #excelFile { display: none; }
        .custom-file-upload { background-color: var(--primary-color); color: white; padding: 10px 24px; border-radius: 6px; display: inline-block; font-weight: 600; cursor: pointer; }

        .table-container { overflow-x: auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background-color: #f8fafc; color: var(--text-main); font-weight: 600; padding: 16px; border-bottom: 2px solid var(--border-color); font-size: 0.9rem; }
        td { padding: 14px; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; }
        tr:hover { background-color: #fcfdfe; }
        
        .st-name { font-weight: 700; color: var(--primary-color); background-color: #f0f7ff; width: 150px; }
        .ext-station { background-color: #fffaf0; } /* 연장구간 강조색 */

        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
        .badge-success { background-color: #def7ec; color: var(--success); }
        .badge-danger { background-color: #fde8e8; color: var(--danger); }
        .bad-val { color: var(--danger); font-weight: bold; background: #fff5f5; border-radius: 4px; padding: 2px 4px; }
        .rules-info { margin-top: 10px; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🟦 승강장 공조기 가동 점검 (연장구간 포함)</h1>
            <div style="font-size: 0.85rem; color: var(--text-muted);">대구교통공사 기계 분야 운영관리</div>
        </header>

        <div class="card">
            <div class="upload-area" onclick="document.getElementById('excelFile').click()">
                <label for="excelFile" class="custom-file-upload">일보 파일 업로드</label>
                <p>파일을 클릭하거나 이 영역에 드롭하세요</p>
                <div class="rules-info">※ 판정 기준: ±40분 오차 허용 (시점: 좌측 / 종점: 우측)</div>
                <input type="file" id="excelFile" accept=".xlsx, .xls" />
            </div>
        </div>

        <div id="resultTable" class="table-container"></div>
    </div>

    <script>
        const RULES = {
            "type1": { s: 17, e: 1 }, "type2": { s: 15, e: 1 },
            "type3": { s: 15.5, e: 1 }, "default": { s: 16.5, e: 1 }
        };
        const TOLERANCE = 40 / 60; 

        // 역사별 유형 매핑 (공백 없이 작성)
        const STATION_TYPES = {
            "명덕": "type1", "청라언덕": "type1", "반월당(2)": "type1",
            "현충로": "type2", "중앙로": "type2", "안심": "type2", 
            "다사": "type2", "두류": "type2", "담티": "type2", "영남대": "type2",
            "반월당(1)": "type3", "설화명곡": "default", "화원": "default"
        };

        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                processData(workbook.Sheets[workbook.SheetNames[0]]);
            };
            reader.readAsBinaryString(file);
        });

        const cleanText = (str) => str ? String(str).replace(/\s+/g, '') : '';
        const parseToHours = (val) => {
            if (!val) return 0;
            if (typeof val === 'number') return val * 24; 
            const parts = String(val).split(':');
            return parts.length < 2 ? (parseFloat(val) || 0) : (parseInt(parts[0]) + (parseInt(parts[1]) / 60));
        };
        const checkRange = (value, target) => (value >= target - TOLERANCE) && (value <= target + TOLERANCE);

        function processData(sheet) {
            const range = XLSX.utils.decode_range(sheet['!ref']);
            let html = `<table><thead>
                <tr>
                    <th>역사명</th>
                    <th>기준(급/배)</th>
                    <th>시점 급기(좌)</th>
                    <th>시점 배기(좌)</th>
                    <th>종점 급기(우)</th>
                    <th>종점 배기(우)</th>
                    <th>최종 판정</th>
                </tr></thead><tbody>`;

            const results = [];

            // 1. 연장 구간 (설화명곡, 화원) 먼저 추출
            // 설화명곡(명곡): E열(4), 화원: F열(5)
            // 승강장 급기 시작: 82행(81) -> 배기: 83행(82) / 우측 급기: 90행(89) -> 배기: 91행(90)
            const extCols = [4, 5];
            extCols.forEach(col => {
                let name = (col === 4) ? "설화명곡" : "화원";
                results.push(extractRowData(sheet, name, col, 81, 82, 89, 90, true));
            });

            // 2. 나머지 역사 (대곡 ~ 안심) 추출
            for (let col = 4; col <= range.e.c; col++) {
                let rawName = cleanText(getCellValue(sheet, 0, col));
                if (!rawName || rawName === '합계' || rawName === '명곡' || rawName === '화원') continue;
                results.push(extractRowData(sheet, rawName, col, 5, 6, 13, 14, false));
            }

            results.forEach(res => { html += res; });
            html += `</tbody></table>`;
            document.getElementById('resultTable').innerHTML = html;
        }

        function extractRowData(sheet, name, col, lsR, leR, rsR, reR, isExt) {
            const type = STATION_TYPES[name] || "default";
            const target = RULES[type];
            const rawVals = [
                getCellValue(sheet, lsR, col), getCellValue(sheet, leR, col),
                getCellValue(sheet, rsR, col), getCellValue(sheet, reR, col)
            ];
            const v = rawVals.map(rv => parseToHours(rv));
            const pass = [
                checkRange(v[0], target.s), checkRange(v[1], target.e),
                checkRange(v[2], target.s), checkRange(v[3], target.e)
            ];
            const isAllPass = pass.every(p => p);

            return `<tr class="${isExt ? 'ext-station' : ''}">
                <td class="st-name">${name}</td>
                <td style="color:var(--text-muted); font-size:0.8rem;">급 ${target.s}h / 배 ${target.e}h</td>
                <td class="${pass[0] ? '' : 'bad-val'}">${rawVals[0] || '0'}</td>
                <td class="${pass[1] ? '' : 'bad-val'}">${rawVals[1] || '0'}</td>
                <td class="${pass[2] ? '' : 'bad-val'}">${rawVals[2] || '0'}</td>
                <td class="${pass[3] ? '' : 'bad-val'}">${rawVals[3] || '0'}</td>
                <td><span class="badge ${isAllPass ? 'badge-success' : 'badge-danger'}">${isAllPass ? '정상' : '확인필요'}</span></td>
            </tr>`;
        }

        function getCellValue(sheet, row, col) {
            const cell = sheet[XLSX.utils.encode_cell({ r: row, c: col })];
            return cell ? cell.w || cell.v : null;
        }
    </script>
</body>
</html>
