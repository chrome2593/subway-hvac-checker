<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTRO 승강장 공조 시스템</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div id="home-view" class="view">
        <div class="hero">
            <div class="logo">🟦 DTRO</div>
            <h1>승강장 공조기 가동 현황<br>자동 점검 시스템</h1>
            <p>가동일보 데이터를 분석하여 스케줄 준수 여부를 자동으로 판정합니다.</p>
            <button class="start-btn" onclick="showApp()">시스템 시작하기</button>
        </div>
    </div>

    <div id="app-view" class="view hidden">
        <div class="container">
            <header class="nav-header">
                <button class="back-home-btn" onclick="showHome()">← 메인으로</button>
                <div class="view-title">공조 가동 점검</div>
                <div style="width:100px;"></div>
            </header>

            <div id="line-selector" class="selector-grid">
                <div class="line-card l1" onclick="selectLine('line1')">1호선</div>
                <div class="line-card l2" onclick="selectLine('line2')">2호선</div>
            </div>

            <div id="app-content" class="hidden">
                <div id="season-banner"></div>
                <div class="upload-card">
                    <input type="file" id="excelFile" hidden />
                    <div class="drop-zone" onclick="document.getElementById('excelFile').click()">
                        <p>엑셀 파일을 클릭하거나 드래그하세요.</p>
                    </div>
                </div>
                <div id="summary-section"></div>
                <div id="full-list-section"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
