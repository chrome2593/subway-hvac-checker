<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTRO 승강장 공조 점검 시스템</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="home-view" class="hero-view">
        <div class="hero-content">
            <div style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; opacity: 0.8;">DAEGU TRANSPORTATION CORP.</div>
            <h1>승강장 공조 가동 현황<br>자동 점검 시스템</h1>
            <p style="margin-bottom: 40px; opacity: 0.9;">가동일보 엑셀 분석 및 스케줄 자동 판정 솔루션</p>
            <button class="main-start-btn" onclick="showApp()">시스템 시작하기</button>
        </div>
    </div>

    <div id="app-view" class="app-view hidden">
        <header class="app-header">
            <button class="nav-btn" onclick="showHome()">← 메인으로</button>
            <div id="line-indicator" class="line-badge">호선을 선택하세요</div>
            <div style="width:100px;"></div>
        </header>

        <div class="container">
            <div id="line-selector" class="selector-grid">
                <div class="line-card l1" onclick="selectLine('line1')">1호선 가동일보</div>
                <div class="line-card l2" onclick="selectLine('line2')">2호선 가동일보</div>
            </div>

            <div id="main-content" class="hidden">
                <div id="season-banner"></div>
                <div class="upload-section" onclick="document.getElementById('excelFile').click()">
                    <input type="file" id="excelFile" hidden />
                    <div style="font-size: 3rem; margin-bottom: 15px;">📊</div>
                    <p style="font-size: 1.1rem; font-weight: bold;">엑셀 파일을 선택하거나 드래그하세요</p>
                    <p style="color: #888; font-size: 0.9rem; margin-top: 10px;">파일 이름에 날짜(YYYYMMDD)가 포함되어야 합니다.</p>
                </div>
                
                <div id="summary-area"></div>
                <div id="full-list-area"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
