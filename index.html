<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승강장 공조기 점검 시스템 | 대구교통공사</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --line1-color: #d93d3d; --line2-color: #00aa4c; --primary-blue: #0054a6;
            --bg-color: #f4f7fa; --card-bg: #ffffff; --text-main: #2d3748;
            --success: #38a169; --danger: #e53e3e; --border: #e2e8f0;
        }
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1500px; margin: 0 auto; }

        /* 메뉴 */
        #main-menu { display: flex; gap: 30px; justify-content: center; align-items: center; min-height: 70vh; }
        .menu-card { 
            background: white; width: 280px; padding: 50px 20px; border-radius: 24px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); cursor: pointer; transition: 0.4s; border-bottom: 8px solid #ccc;
        }
        .menu-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .menu-card.line1 { border-color: var(--line1-color); }
        .menu-card.line2 { border-color: var(--line2-color); }

        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--border); }
        .back-btn { cursor: pointer; padding: 10px 18px; background: #fff; border: 1px solid var(--border); border-radius: 8px; font-weight: bold; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.04); }
        .upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; }
        
        .table-container { background: white; border-radius: 16px; overflow-x: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 1200px; }
        th { background-color: #f8fafc; padding: 15px 10px; border-bottom: 2px solid var(--border); font-size: 0.85rem; color: #64748b; }
        td { padding: 14px 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .st-name { font-weight: 800; color: var(--primary-blue); background-color: #f0f7ff; position: sticky; left: 0; z-index: 5; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; }
        .badge-success { background-color: #def7ec; color: var(--success); }
        .badge-danger { background-color: #fde8e8; color: var(--danger); }
        .bad-val { color: var(--danger); font-weight: bold; background: #fff5f5; padding: 2px 5px; border-radius: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="main-menu">
            <div class="menu-card line1" onclick="showView('line1')">
                <h2 style="color:var(--line1-color)">1</h2>
                <p style="font-weight:bold; margin-top:15px;">1호선 가동일보 점검</p>
            </div>
            <div class="menu-card line2" onclick="showView('line2')">
                <h2 style="color:var(--line2-color)">2</h2>
                <p style="font-weight:bold; margin-top:15px;">2호선 가동일보 점검</p>
            </div>
        </div>

        <div id="app-view" class="hidden">
            <div class="nav-header">
                <div class="back-btn" onclick="goHome()">← 처음으로</div>
                <h1 id="view-title" style="margin:0; font-size:1.4rem; color:var(--primary-blue);"></h1>
                <div style="width:80px;"></div>
            </div>
            <div class="card">
                <div class="upload-area" onclick="document.getElementById('excelFile').click()">
                    <span style="background:var(--primary-blue); color:white; padding:12px 28px; border-radius:8px; font-weight:bold;">일보 엑셀 업로드</span>
                    <p id="upload-guide" style="margin-top:20px; color:#64748b; font-size:0.9rem;"></p>
                    <input type="file" id="excelFile" accept=".xlsx, .xls" style="display:none" />
                </div>
            </div>
            <div id="resultTable" class="table-container"></div>
        </div>
    </div>

    <script>
        let currentLine = '';
        const TOLERANCE = 40 / 60; 
        const RULES = { 
            "type1": { s: 17, ue: 1, le: 0.5 }, "type2": { s: 15, ue: 1, le: 0.5 }, 
            "type3": { s: 15.5, ue: 1, le: 0.5 }, "default": { s: 16.5, ue: 1, le: 0.5 } 
        };
        const STATION_TYPES = {
            "명덕": "type1", "청라언덕": "type1", "반월당": "type1",
            "현충로": "type2", "중앙로": "type2", "안심": "type2", "다사": "type2", "두류": "type2", "담티": "type2", "영남대": "type2"
        };
        const LINE2_STATIONS = ["문양", "다사", "대실", "강창", "계명대", "성서산업단지", "이곡", "용산", "죽전", "감삼", "두류", "내당", "반고개", "청라언덕", "반월당", "경대병원", "대구은행", "범어", "수성구청", "만촌", "담티", "연호", "대공원", "고산", "신매", "사월", "정평", "임당", "영남대"];

        function showView(line) {
            currentLine = line;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            document.getElementById('view-title').innerText = line === 'line1' ? '1호선 점검' : '2호선 점검 (통합 일보 양식)';
            document.getElementById('resultTable').innerHTML = '';
        }

        function goHome() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('app-view').classList.add('hidden');
            document.getElementById('excelFile').value = '';
        }

        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                const sheetName = workbook.SheetNames.find(n => n.includes("장비")) || workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                
                if(currentLine === 'line1') processLine1(sheet);
                else processLine2(sheet);
            };
            reader.readAsBinaryString(file);
        });

        // --- [2호선 엔진: 세로 통합 일보 정밀 스캔] ---
        function processLine2(sheet) {
            const range = XLSX.utils.decode_range(sheet['!ref']);
            const finalResults = [];
            let currentData = null;

            // 1. 시트 전체를 위에서 아래로 한 줄씩 탐색
            for (let r = 0; r <= range.e.r; r++) {
                // A~C열 텍스트 결합 (역사명 및 장비명 추출용)
                let rowLabel = cleanText(getCellValue(sheet, r, 0) + getCellValue(sheet, r, 1) + getCellValue(sheet, r, 2));
                let value = getCellValue(sheet, r, 4); // E열 가동시간

                // 2. 새로운 역사가 나타났는지 확인 (예: "일일장비가동자료_다사")
                const foundStation = LINE2_STATIONS.find(st => rowLabel.includes(st) && rowLabel.includes("가동자료"));
                
                if (foundStation) {
                    // 이전 역사 데이터가 있으면 결과 배열에 추가
                    if (currentData) finalResults.push(formatRowL2(currentData));
                    // 새 역사 데이터 객체 생성
                    currentData = { name: foundStation, ls:null, lue:null, lle:null, rs:null, rue:null, rle:null };
                    continue;
                }

                // 3. 역사 하위의 장비 키워드 매칭
                if (currentData) {
                    if (rowLabel.includes("승강장") || rowLabel.includes("승강")) {
                        if (rowLabel.includes("급기")) {
                            if (rowLabel.includes("좌")) currentData.ls = value; 
                            else if (rowLabel.includes("우")) currentData.rs = value;
                        } else if (rowLabel.includes("상부배기")) {
                            if (rowLabel.includes("좌")) currentData.lue = value;
                            else if (rowLabel.includes("우")) currentData.rue = value;
                        } else if (rowLabel.includes("하부배기")) {
                            if (rowLabel.includes("좌")) currentData.lle = value;
                            else if (rowLabel.includes("우")) currentData.rle = value;
                        }
                    }
                }
            }
            // 마지막 역사 추가
            if (currentData) finalResults.push(formatRowL2(currentData));

            if (finalResults.length === 0) {
                document.getElementById('resultTable').innerHTML = "<p style='padding:40px; text-align:center; color:red; font-weight:bold;'>2호선 데이터를 감지하지 못했습니다. 시트 이름이 '장비'인지 확인해주세요.</p>";
            } else {
                renderTableL2(finalResults);
            }
        }

        function formatRowL2(d) {
            const type = STATION_TYPES[d.name] || "default";
            const target = RULES[type];
            const check = (val, goal) => {
                if(!val || val === '0' || val === '-' || val === '') return true;
                let h = parseToHours(val);
                return (h >= goal - TOLERANCE) && (h <= goal + TOLERANCE);
            };

            const pass = [check(d.ls, target.s), check(d.lue, target.ue), check(d.lle, target.le), check(d.rs, target.s), check(d.rue, target.ue), check(d.rle, target.le)];
            const isAll = pass.every(p => p);
            const td = (val, ok) => `<td class="${ok ? '' : 'bad-val'}">${val || '-'}</td>`;

            return `<tr><td class="st-name">${d.name}</td>
                <td style="font-size:0.75rem; color:#888">급${target.s}/상${target.ue}/하${target.le}</td>
                ${td(d.ls, pass[0])} ${td(d.lue, pass[1])} ${td(d.lle, pass[2])}
                ${td(d.rs, pass[3])} ${td(d.rue, pass[4])} ${td(d.rle, pass[5])}
                <td><span class="badge ${isAll ? 'badge-success' : 'badge-danger'}">${isAll ? '정상' : '확인필요'}</span></td></tr>`;
        }

        function renderTableL2(rowsHtml) {
            document.getElementById('resultTable').innerHTML = `<table><thead><tr><th>역사명</th><th>기준(h)</th><th>시점급기</th><th>시점상부</th><th>시점하부</th><th>종점급기</th><th>종점상부</th><th>종점하부</th><th>최종판정</th></tr></thead><tbody>${rowsHtml.join('')}</tbody></table>`;
        }

        // --- 1호선 로직 유지 ---
        function processLine1(sheet) {
            const range = XLSX.utils.decode_range(sheet['!ref']);
            const rows = [];
            [4, 5].forEach(col => { rows.push(extractRowL1(sheet, (col===4?"설화명곡":"화원"), col, 81, 82, 89, 90)); });
            for (let col = 4; col <= range.e.c; col++) {
                let name = cleanText(getCellValue(sheet, 0, col));
                if (!name || ['합계','명곡','화원'].includes(name)) continue;
                rows.push(extractRowL1(sheet, name, col, 5, 6, 13, 14));
            }
            document.getElementById('resultTable').innerHTML = `<table><thead><tr><th>역사명</th><th>기준</th><th>시점급기</th><th>시점배기</th><th>종점급기</th><th>종점배기</th><th>판정</th></tr></thead><tbody>${rows.join('')}</tbody></table>`;
        }

        function extractRowL1(sheet, name, col, lsR, leR, rsR, reR) {
            const type = STATION_TYPES[name] || "default";
            const target = {s: RULES[type].s, e: RULES[type].ue};
            const raw = [getCellValue(sheet, lsR, col), getCellValue(sheet, leR, col), getCellValue(sheet, rsR, col), getCellValue(sheet, reR, col)];
            const v = raw.map(rv => parseToHours(rv));
            const pass = v.map((val, i) => i%2===0 ? (val >= target.s-TOLERANCE && val <= target.s+TOLERANCE) : (val >= target.e-TOLERANCE && val <= target.e+TOLERANCE));
            const isAll = pass.every(p => p);
            return `<tr><td class="st-name">${name}</td><td style="font-size:0.75rem;color:#94a3b8">급${target.s}/배${target.e}</td>` + 
                   raw.map((r, i) => `<td class="${pass[i]?'':'bad-val'}">${r||'0'}</td>`).join('') +
                   `<td><span class="badge ${isAll?'badge-success':'badge-danger'}">${isAll?'정상':'확인필요'}</span></td></tr>`;
        }

        // --- 공통 유틸리티 ---
        function getCellValue(sheet, row, col) {
            const cell = sheet[XLSX.utils.encode_cell({r:row, c:col})];
            return cell ? cell.w || cell.v : "";
        }
        const cleanText = (str) => str ? String(str).replace(/\s+/g, '') : '';
        const parseToHours = (val) => {
            if(!val) return 0;
            if(typeof val === 'number') return val * 24;
            const p = String(val).split(':');
            return p.length < 2 ? parseFloat(val)||0 : parseInt(p[0]) + (parseInt(p[1])/60);
        };
    </script>
</body>
</html>
