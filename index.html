<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTRO 기계설비 운영지원 시스템</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div id="home-view" class="hero-view">
        <div class="hero-content">
            <div style="letter-spacing: 4px; opacity: 0.7; margin-bottom: 10px;">DAEGU TRANSPORTATION CORP.</div>
            <h1>승강장 공조 시스템<br>지능형 가동 점검</h1>
            <button class="main-start-btn" onclick="showApp()">운영지원 시스템 접속</button>
        </div>
    </div>

    <div id="app-view" class="hidden">
        <header class="app-header">
            <div class="container header-inner">
                <button class="nav-btn" onclick="showHome()">← 처음으로</button>
                <div id="line-indicator" class="line-badge">노선 선택</div>
                <div style="width:80px;"></div>
            </div>
        </header>

        <main class="container">
            <section id="line-selector" class="selector-view">
                <div style="text-align:center;">
                    <h2 style="font-weight: 800; font-size: 2rem;">검사 노선 선택</h2>
                    <p style="color:#64748b;">점검하고자 하는 호선을 선택하여 주십시오.</p>
                </div>
                <div class="selector-grid">
                    <div class="line-card l1" onclick="selectLine('line1')">
                        <div class="line-num">1</div>
                        <h3>1호선 가동점검</h3>
                        <p>설화명곡 ~ 안심</p>
                    </div>
                    <div class="line-card l2" onclick="selectLine('line2')">
                        <div class="line-num">2</div>
                        <h3>2호선 가동점검</h3>
                        <p>문양 ~ 영남대</p>
                    </div>
                </div>
            </section>

            <section id="main-content" class="hidden" style="margin-top: 40px;">
                <div id="season-banner"></div>
                
                <div class="dashboard-card">
                    <div class="upload-section" onclick="document.getElementById('excelFile').click()">
                        <input type="file" id="excelFile" hidden />
                        <div style="font-size: 2.5rem; margin-bottom: 10px;">📂</div>
                        <h3 style="margin:0;">엑셀 파일 업로드</h3>
                        <p style="color: #94a3b8; font-size: 0.9rem; margin-top: 8px;">분석할 가동일보 파일을 선택하거나 드래그하세요.</p>
                    </div>
                </div>

                <div id="summary-area"></div>
                <div id="full-list-area"></div>
            </section>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
