<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTRO 기계설비 운영지원 시스템</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div id="home-view" class="hero-view">
        <div class="hero-content">
            <div class="corp-name">DAEGU TRANSPORTATION CORP.</div>
            <h1>승강장 공조 시스템<br>지능형 가동 점검</h1>
            <button class="main-start-btn" onclick="showApp()">운영지원 시스템 접속</button>
        </div>
    </div>

    <div id="app-view" class="hidden">
        <header class="app-header">
            <button class="nav-btn" onclick="showHome()">← 시스템 종료</button>
            <div id="line-indicator" class="line-badge">호선을 선택하여 주십시오</div>
            <div style="width:100px;"></div>
        </header>

        <div class="container">
            <div id="line-selector" class="selector-view">
                <div style="text-align:center; margin-bottom: 40px;">
                    <h2 style="font-weight: 800; color: #1e293b;">검사 대상 노선 선택</h2>
                    <p style="color:#64748b;">점검할 호선의 가동일보 양식을 분석합니다.</p>
                </div>
                <div class="selector-grid">
                    <div class="line-card l1" onclick="selectLine('line1')">
                        <div class="line-num">1</div>
                        <h3>1호선 점검</h3>
                        <p>설화명곡 ~ 안심</p>
                    </div>
                    <div class="line-card l2" onclick="selectLine('line2')">
                        <div class="line-num">2</div>
                        <h3>2호선 점검</h3>
                        <p>문양 ~ 영남대</p>
                    </div>
                </div>
            </div>

            <div id="main-content" class="hidden">
                <div id="season-banner"></div>
                
                <div class="upload-section" onclick="document.getElementById('excelFile').click()">
                    <input type="file" id="excelFile" hidden />
                    <div style="font-size: 2.5rem; margin-bottom: 10px;">📊</div>
                    <h3 style="margin:0;">가동일보 파일 업로드</h3>
                    <p style="color: #94a3b8; font-size: 0.9rem;">클릭하여 엑셀 파일을 선택하거나 드래그 앤 드롭 하세요.</p>
                </div>

                <div id="summary-area"></div>
                <div id="full-list-area"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
