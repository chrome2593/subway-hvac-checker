<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTRO 기계설비 운영지원 시스템</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="home-view" class="hero-view">
        <div class="hero-content">
            <div style="letter-spacing: 6px; opacity: 0.8; margin-bottom: 15px;">DAEGU TRANSPORTATION CORP.</div>
            <h1>기계설비 가동현황<br>지능형 점검 시스템</h1>
            <button class="main-start-btn" onclick="showApp()">운영지원 시스템 접속</button>
        </div>
    </div>
    <div id="app-view" class="hidden">
        <header class="app-header">
            <div class="container header-inner">
                <button class="nav-btn" onclick="showHome()">← 시스템 종료</button>
                <div id="line-indicator" class="line-badge">노선을 선택하십시오</div>
                <div class="tab-menu">
                    <button class="tab-btn active" onclick="switchTab('hvac')">플랫폼 공조기</button>
                    <button class="tab-btn" onclick="switchTab('air')">공기청정기</button>
                </div>
            </div>
        </header>
        <main class="container">
            <div id="line-selector" class="selector-grid">
                <div class="line-card l1" onclick="selectLine('line1')"><div class="lnum">1</div>1호선 점검</div>
                <div class="line-card l2" onclick="selectLine('line2')"><div class="lnum">2</div>2호선 점검</div>
            </div>
            <div id="main-content" class="hidden">
                <div id="season-banner" class="season-info"></div>
                <div class="upload-box" onclick="document.getElementById('excelFile').click()">
                    <input type="file" id="excelFile" hidden />
                    <div style="font-size: 2.5rem; margin-bottom: 10px;">📊</div>
                    <h3>가동일보 파일 업로드</h3>
                </div>
                <div id="summary-area"></div>
                <div id="full-list-area"></div>
            </div>
        </main>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
